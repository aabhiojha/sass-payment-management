services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-saas_payments}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-saas_payments}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  notification-service:
    build:
      context: ./backend/notification-service
      dockerfile: DockerFile
    restart: unless-stopped
    environment:
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      SENDGRID_FROM_EMAIL: ${SENDGRID_FROM_EMAIL}
      SENDGRID_FROM_NAME: ${SENDGRID_FROM_NAME}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL}
      FRONTEND_ACCEPT_INVITE_PATH: ${FRONTEND_ACCEPT_INVITE_PATH:-/accept-invite}
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  core-monolith:
    build:
      context: ./backend/core-monolith
      dockerfile: DockerFile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      notification-service:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-saas_payments}
      DB_USERNAME: ${POSTGRES_USER:-app}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      NOTIFICATION_SERVICE_URL: http://notification-service:8081
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_SECONDS: ${JWT_EXPIRATION_SECONDS:-86400}
      CORS_ALLOWED_ORIGINS: ${FRONTEND_BASE_URL}
    ports:
      - "${CORE_PORT:-8080}:8080"
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
      dockerfile: DockerFile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    restart: unless-stopped
    depends_on:
      core-monolith:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    networks:
      - backend

volumes:
  postgres_data:

networks:
  backend:
    driver: bridge
