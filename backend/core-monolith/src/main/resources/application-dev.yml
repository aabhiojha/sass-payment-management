spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/paynext-db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    show-sql: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
  data:
    jpa:
      repositories:
        bootstrap-mode: deferred
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false

logging:
  level:
    root: INFO
    org.springframework: INFO
    org.hibernate.SQL: WARN

notification:
  service:
    base-url: http://localhost:8081

app:
  jwt:
    secret: fac50670a12e0028cd78296f6c6bf9b8909248052469098dba20bd94579c4f90
    expiration-seconds: 84600
  cors:
    allowed-origins: http://localhost:3000
