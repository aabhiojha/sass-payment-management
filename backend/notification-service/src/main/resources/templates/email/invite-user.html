<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workspace Invitation</title>
</head>
<body style="margin:0;padding:0;background:#f1f5f9;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;">

<table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="background:#f1f5f9;padding:40px 16px;">
  <tr><td align="center">
    <table role="presentation" cellpadding="0" cellspacing="0" width="520" style="max-width:520px;">

      <!-- Workspace label -->
      <tr>
        <td style="padding:0 0 14px;text-align:center;">
          <span th:text="${tenantName}" style="font-size:12px;font-weight:600;color:#94a3b8;letter-spacing:.04em;text-transform:uppercase;">Workspace</span>
        </td>
      </tr>

      <!-- Card -->
      <tr>
        <td style="background:#ffffff;border-radius:12px;border-top:4px solid #2563eb;box-shadow:0 1px 4px rgba(0,0,0,.06);">
          <table role="presentation" cellpadding="0" cellspacing="0" width="100%">
            <tr>
              <td style="padding:36px 40px 32px;">

                <p style="margin:0 0 12px;font-size:30px;line-height:1;">&#128075;</p>

                <h1 style="margin:0 0 10px;font-size:21px;font-weight:700;color:#0f172a;line-height:1.3;">
                  You've been invited
                </h1>

                <p style="margin:0 0 28px;font-size:14px;color:#64748b;line-height:1.6;">
                  You're joining
                  <strong th:text="${tenantName}" style="color:#0f172a;">Your Workspace</strong>
                  as <strong th:text="${role}" style="color:#0f172a;">User</strong>.
                  Set up your account to get started.
                </p>

                <!-- CTA -->
                <table role="presentation" cellpadding="0" cellspacing="0" style="margin-bottom:28px;">
                  <tr>
                    <td style="background:#2563eb;border-radius:8px;">
                      <a th:href="${acceptUrl}" href="#"
                         style="display:inline-block;padding:13px 32px;color:#ffffff;font-size:14px;font-weight:600;text-decoration:none;">
                        Activate account &rarr;
                      </a>
                    </td>
                  </tr>
                </table>

                <p style="margin:0 0 24px;font-size:12px;color:#94a3b8;">
                  Expires <strong th:text="${expiry}" style="color:#64748b;font-weight:500;">N/A</strong>
                </p>

                <hr style="border:none;border-top:1px solid #f1f5f9;margin:0 0 20px;">

                <p style="margin:0 0 8px;font-size:12px;color:#94a3b8;">Button not working? Copy and paste this link:</p>
                <div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px 14px;">
                  <a th:href="${acceptUrl}" th:text="${acceptUrl}" href="#"
                     style="font-size:11px;font-family:monospace;color:#2563eb;text-decoration:none;word-break:break-all;line-height:1.6;">
                    link
                  </a>
                </div>

              </td>
            </tr>
          </table>
        </td>
      </tr>

      <!-- Footer -->
      <tr>
        <td style="padding:18px 0 0;text-align:center;">
          <p style="margin:0;font-size:11px;color:#94a3b8;">Not expecting this? You can safely ignore it.</p>
        </td>
      </tr>

    </table>
  </td></tr>
</table>

</body>
</html>
